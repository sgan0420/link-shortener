default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    # max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

production:
  # Single-DB setup — solid_cache_entries lives in the primary database.
  # See docs/WIKI.md §2.8.
  <<: *default
